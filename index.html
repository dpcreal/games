<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 40px; display: flex; flex-direction: column; align-items: center; background: #f4f4f4; }
        .header { width: 100%; max-width: 1000px; display: flex; justify-content: flex-start; margin-bottom: 40px; }
        .title { font-size: 24px; font-weight: bold; width: 220px; line-height: 1.2; }
        .search-bar { flex-grow: 1; margin-left: 30px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px; 
            width: 100%; 
            max-width: 1000px; 
        }

        .game-box { 
            aspect-ratio: 1/1; 
            border: 2px solid #333; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            background: white;
            transition: 0.2s;
            text-decoration: none; /* Removes underline from links */
            color: black;
        }

        .game-box:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .game-box img { width: 80%; height: 80%; object-fit: contain; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">Woodpecker (from dps) game portal</div>
        <input type="text" class="search-bar" placeholder="Search for games...">
    </div>

    <div class="grid">
        <a href="./slope/index.html" class="game-box">
            <img src="slope-icon.png" alt="Slope">
            <span>SLOPE</span>
        </a>

        <a href="game2.html" class="game-box">
            <div style="font-size: 40px;">🎮</div>
            <span>GAME 2</span>
        </a>

        <a href="game3.html" class="game-box">
            <div style="font-size: 40px;">🕹️</div>
            <span>GAME 3</span>
        </a>
    </div>

</body>
</html>
