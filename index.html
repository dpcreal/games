<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Arcade</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        .game-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .game-card { border: 2px solid #333; padding: 10px; border-radius: 10px; background: #222; width: 320px; }
        iframe { width: 100%; height: 200px; border: none; border-radius: 5px; }
        h1 { color: #00ffcc; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

    <h1>🎮 My GitHub Gaming Hub</h1>
    <p>Welcome to my collection of embedded games.</p>

    <div class="game-container">
        <div class="game-card">
            <h3>Game Title 1</h3>
            <div class="embed-wrapper">
                <iframe src="https://www.example.com/your-game-link"></iframe>
            </div>
            <p>A short description of the game.</p>
        </div>

        </div>

</body>
</html>
