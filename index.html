<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woodpecker(from dps) game portal</title>
    <style>
        /* General styling for the page */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Top section layout */
        .top-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: flex-start; /* Align content to the left */
            align-items: flex-start; /* Top align items */
            margin-bottom: 20px;
        }

        /* Title style based on your photo */
        .page-title {
            width: 30%; /* Limits title width to create line breaks like in photo */
            font-size: 24px;
            font-weight: bold;
            margin: 0;
            padding-right: 20px;
        }

        /* Placeholder for your search bar text */
        .search-placeholder {
            flex-grow: 1; /* Occupies remaining space */
            text-align: left;
            font-size: 16px;
            margin: 0;
        }

        /* Grid container for the games */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Exactly 3 columns as requested */
            gap: 20px; /* Space between grid items */
            width: 100%;
            max-width: 1000px;
        }

        /* Styling for each game box */
        .game-box {
            width: 100%;
            aspect-ratio: 1 / 1; /* Makes the box a perfect square */
            border: 2px solid #ccc;
            border-radius: 8px; /* Optional slight rounding for better look */
            cursor: pointer;
            overflow: hidden; /* Ensures nothing spills out of the border */
            transition: transform 0.2s, box-shadow 0.2s;
            background-color: #f9f9f9;
        }

        /* Hover effects for game boxes */
        .game-box:hover {
            transform: scale(1.03); /* Subtle zoom-in */
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border-color: #007BFF; /* Blue border on hover */
        }

        /* Makes sure images inside game-boxes fit perfectly */
        .game-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Images cover the space without stretching */
            display: block; /* Prevents alignment issues */
        }
    </style>
</head>
<body>

    <div class="top-container">
        <h1 class="page-title">Woodpecker(from dps) game portal</h1>
        <p class="search-placeholder">Search bar will be here.</p>
    </div>

    <div class="game-grid">

        <div class="game-box" onclick="launch('YOUR_GAME_URL_1_HERE')">
            <img src="YOUR_IMAGE_PATH_1_HERE" alt="Game 1 Title">
        </div>

        <div class="game-box" onclick="launch('YOUR_GAME_URL_2_HERE')">
            <img src="YOUR_IMAGE_PATH_2_HERE" alt="Game 2 Title">
        </div>

        <div class="game-box" onclick="launch('YOUR_GAME_URL_3_HERE')">
            <img src="YOUR_IMAGE_PATH_3_HERE" alt="Game 3 Title">
        </div>

        <div class="game-box" onclick="launch('YOUR_GAME_URL_4_HERE')">
            <img src="YOUR_IMAGE_PATH_4_HERE" alt="Game 4 Title">
        </div>

        <div class="game-box" onclick="launch('YOUR_GAME_URL_5_HERE')">
            <img src="YOUR_IMAGE_PATH_5_HERE" alt="Game 5 Title">
        </div>

        <div class="game-box" onclick="launch('YOUR_GAME_URL_6_HERE')">
            <img src="YOUR_IMAGE_PATH_6_HERE" alt="Game 6 Title">
        </div>

        </div>

    <script>
        function launch(url) {
            // 1. Open the blank page
            var win = window.open('about:blank', '_blank');

            // 2. Format the blank page
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';

            // 3. Create and configure the iframe
            var iframe = win.document.createElement('iframe');
            iframe.style.border = 'none';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.margin = '0';
            iframe.src = url;

            // 4. Inject the iframe
            win.document.body.appendChild(iframe);
        }
    </script>

</body>
</html>
